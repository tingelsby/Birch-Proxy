<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birch – AgencyBloc Query</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
    header { background: #1e3a5f; color: white; padding: 14px 20px; font-size: 16px; font-weight: 600; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .user  { align-self: flex-end; background: #1e3a5f; color: white; border-bottom-right-radius: 4px; }
    .bot   { align-self: flex-start; background: white; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
    .error { background: #fff0f0; border-color: #ffcccc; color: #c00; }
    footer { padding: 12px 16px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 8px; }
    #input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
    #input:focus { border-color: #1e3a5f; }
    button { background: #1e3a5f; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #setup { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin: 20px; }
    #setup h2 { font-size: 15px; margin-bottom: 12px; color: #333; }
    #setup input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
    #setup button { width: 100%; }
    #setup label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    #forget { background: none; color: #999; font-size: 12px; padding: 4px 8px; border: 1px solid #ddd; margin-top: 8px; }
  </style>
</head>
<body>
  <header>🌿 Birch Benefits – AgencyBloc Assistant</header>

  <div id="setup">
    <h2>Enter your AgencyBloc credentials to get started</h2>
    <label>SID</label>
    <input type="text" id="sid" placeholder="Your AgencyBloc SID" />
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Your AgencyBloc API Key" />
    <button onclick="connect()">Connect</button>
    <br/>
    <button id="forget" onclick="forgetCreds()" style="display:none">Forget saved credentials</button>
  </div>

  <div id="chat" style="display:none"></div>

  <footer style="display:none" id="footer">
    <input id="input" placeholder="Ask something — e.g. 'Show me groups renewing in May'" onkeydown="if(event.key==='Enter')send()" />
    <button id="sendBtn" onclick="send()">Send</button>
  </footer>

  <script>
    let SID = "", KEY = "";
    let history = [];
    const AB_BASE = "https://app.agencybloc.com/api/v1";

    // Pre-fill from localStorage if saved
    const saved = JSON.parse(localStorage.getItem("birch_creds") || "{}");
    if (saved.sid) document.getElementById("sid").value = saved.sid;
    if (saved.key) document.getElementById("apiKey").value = saved.key;
    if (saved.sid && saved.key) document.getElementById("forget").style.display = "inline-block";

    async function connect() {
      SID = document.getElementById("sid").value.trim();
      KEY = document.getElementById("apiKey").value.trim();
      if (!SID || !KEY) return alert("Please enter both your SID and API Key.");

      // Save to localStorage
      localStorage.setItem("birch_creds", JSON.stringify({ sid: SID, key: KEY }));

      document.getElementById("setup").style.display = "none";
      document.getElementById("chat").style.display  = "flex";
      document.getElementById("footer").style.display = "flex";

      addMsg("bot", "Connecting to AgencyBloc...");
      testConnection();
    }

    function forgetCreds() {
      localStorage.removeItem("birch_creds");
      document.getElementById("sid").value = "";
      document.getElementById("apiKey").value = "";
      document.getElementById("forget").style.display = "none";
    }

    async function testConnection() {
      try {
        const data = await abPost("/groups/list", { pageSize: 1 });
        if (data.errorCode && data.errorCode !== 0) {
          addMsg("error", "❌ Auth failed: " + (data.errorMessage || JSON.stringify(data)));
        } else {
          addMsg("bot", "✅ Connected to AgencyBloc!\n\nTry asking:\n• Show me all groups\n• List individuals with last name Smith\n• Show open leads\n• What groups renew in May?");
        }
      } catch (e) {
        addMsg("error", "❌ Connection error: " + e.message);
      }
    }

    async function abPost(endpoint, params = {}) {
      const url = `${AB_BASE}${endpoint}`;
      const body = new URLSearchParams({ sid: SID, key: KEY, ...params }).toString();
      const res = await fetch(`/api/proxy?url=${encodeURIComponent(url)}`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
      });
      const text = await res.text();
      try { return JSON.parse(text); } catch { return { raw: text }; }
    }

    async function claudeCall(payload) {
      const res = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      return res.json();
    }

    async function send() {
      const input = document.getElementById("input");
      const q = input.value.trim();
      if (!q) return;
      input.value = "";
      addMsg("user", q);
      document.getElementById("sendBtn").disabled = true;
      history.push({ role: "user", content: q });

      const systemPrompt = `You are a helpful assistant for Birch Benefits, a benefits brokerage firm.
You have access to AgencyBloc's REST API. Given the user's question, respond with ONLY a valid JSON object.

Available endpoints and their key params:
- /groups/list       — pageSize, pageNumber, groupName, groupStatus
- /individuals/list  — pageSize, pageNumber, lastName, firstName, groupID
- /leads/list        — pageSize, pageNumber, leadStatus, assignedUserID
- /policies/list     — pageSize, pageNumber, groupID, individualID, policyStatus, carrierID
- /activities/list   — pageSize, pageNumber, groupID, individualID, activityType
- /carriers/list     — pageSize, pageNumber

Respond with ONLY this JSON, no other text:
{ "endpoint": "/groups/list", "params": { "pageSize": 25 } }

If you cannot map to an endpoint, respond with:
{ "endpoint": null, "answer": "your plain English answer here" }

Never include sid or key in params.`;

      try {
        const claudeData = await claudeCall({
          model: "claude-sonnet-4-20250514",
          max_tokens: 300,
          system: systemPrompt,
          messages: history,
        });

        const raw = claudeData.content?.[0]?.text?.trim() || "{}";
        let plan;
        try {
          plan = JSON.parse(raw.replace(/```json|```/g, "").trim());
        } catch {
          plan = { endpoint: null, answer: raw };
        }

        if (!plan.endpoint) {
          const ans = plan.answer || "I couldn't map that to an AgencyBloc query.";
          addMsg("bot", ans);
          history.push({ role: "assistant", content: ans });
          return;
        }

        addMsg("bot", `Querying AgencyBloc${plan.endpoint}...`);
        const abData = await abPost(plan.endpoint, plan.params || {});

        if (abData.raw) {
          addMsg("error", "Unexpected response:\n" + abData.raw.substring(0, 500));
          return;
        }

        const sumData = await claudeCall({
          model: "claude-sonnet-4-20250514",
          max_tokens: 800,
          messages: [{
            role: "user",
            content: `The user asked: "${q}"\n\nAgencyBloc returned:\n${JSON.stringify(abData, null, 2).substring(0, 4000)}\n\nSummarize this clearly and concisely for a benefits account manager. Use plain English, no JSON.`
          }]
        });

        const answer = sumData.content?.[0]?.text || JSON.stringify(abData, null, 2);

        // Remove interim "Querying..." message
        const chat = document.getElementById("chat");
        chat.removeChild(chat.lastChild);

        addMsg("bot", answer);
        history.push({ role: "assistant", content: answer });

      } catch (e) {
        addMsg("error", "Error: " + e.message);
      } finally {
        document.getElementById("sendBtn").disabled = false;
      }
    }

    function addMsg(type, text) {
      const chat = document.getElementById("chat");
      const div  = document.createElement("div");
      div.className = "msg " + (type === "user" ? "user" : type === "error" ? "bot error" : "bot");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
