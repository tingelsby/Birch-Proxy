<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birch – AgencyBloc Query</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
    header { background: #1e3a5f; color: white; padding: 14px 20px; font-size: 16px; font-weight: 600; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #1e3a5f; color: white; border-bottom-right-radius: 4px; }
    .bot  { align-self: flex-start; background: white; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
    .error { background: #fff0f0; border-color: #ffcccc; color: #c00; }
    footer { padding: 12px 16px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 8px; }
    #input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
    #input:focus { border-color: #1e3a5f; }
    button { background: #1e3a5f; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #setup { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin: 20px; }
    #setup h2 { font-size: 15px; margin-bottom: 12px; color: #333; }
    #setup input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
    #setup button { width: 100%; }
  </style>
</head>
<body>
  <header>🌿 Birch Benefits – AgencyBloc Assistant</header>

  <div id="setup">
    <h2>Enter your AgencyBloc API Key to get started</h2>
    <input type="password" id="apiKey" placeholder="Your AgencyBloc API key" />
    <button onclick="saveKey()">Connect</button>
  </div>

  <div id="chat" style="display:none"></div>

  <footer style="display:none" id="footer">
    <input id="input" placeholder="Ask something — e.g. 'Show me groups renewing in April'" onkeydown="if(event.key==='Enter')send()" />
    <button id="sendBtn" onclick="send()">Send</button>
  </footer>

  <script>
    let API_KEY = "";
    let AB_TOKEN = "";
    let history = [];

    const PROXY = "/api/proxy";
    const AB_BASE = "https://api.agencybloc.com/v1";

    function saveKey() {
      const k = document.getElementById("apiKey").value.trim();
      if (!k) return alert("Please enter your API key.");
      API_KEY = k;
      document.getElementById("setup").style.display = "none";
      document.getElementById("chat").style.display = "flex";
      document.getElementById("footer").style.display = "flex";
      addMsg("bot", "Connected! Authenticating with AgencyBloc...");
      authenticate();
    }

    async function authenticate() {
      try {
        const res = await fetch(`${PROXY}?url=${encodeURIComponent(AB_BASE + "/authorize")}`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ api_key: API_KEY }).toString()
        });
        const data = await res.json();
        if (data.token || data.access_token) {
          AB_TOKEN = data.token || data.access_token;
          addMsg("bot", "✅ Authenticated! You can now query your AgencyBloc data.\n\nTry asking:\n• Show me all groups\n• List individuals added this month\n• Show open leads");
        } else {
          addMsg("bot error", "❌ Auth failed. Response:\n" + JSON.stringify(data, null, 2));
        }
      } catch (e) {
        addMsg("bot error", "❌ Network error during auth: " + e.message);
      }
    }

    async function send() {
      const input = document.getElementById("input");
      const q = input.value.trim();
      if (!q) return;
      input.value = "";
      addMsg("user", q);
      document.getElementById("sendBtn").disabled = true;

      history.push({ role: "user", content: q });

      // Ask Claude to figure out which AgencyBloc endpoint to call
      const systemPrompt = `You are a helpful assistant for Birch Benefits, a benefits brokerage. 
You have access to AgencyBloc's REST API. Given the user's question, respond with ONLY a JSON object:
{
  "endpoint": "/v1/groups",       // the AgencyBloc endpoint path
  "params": { "page": 1 }         // any query params to append
}
Available endpoints: /v1/groups, /v1/individuals, /v1/policies, /v1/leads, /v1/activities, /v1/carriers
If you cannot map the question to an endpoint, return: { "endpoint": null, "answer": "your direct answer here" }`;

      try {
        const claudeRes = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 300,
            system: systemPrompt,
            messages: history
          })
        });
        const claudeData = await claudeRes.json();
        const raw = claudeData.content?.[0]?.text || "{}";

        let parsed;
        try { parsed = JSON.parse(raw); } catch { parsed = { endpoint: null, answer: raw }; }

        if (!parsed.endpoint) {
          const answer = parsed.answer || "I couldn't map that to an AgencyBloc query.";
          addMsg("bot", answer);
          history.push({ role: "assistant", content: answer });
          return;
        }

        // Call AgencyBloc via proxy
        const params = new URLSearchParams({ ...(parsed.params || {}), token: AB_TOKEN });
        const abUrl = `${AB_BASE}${parsed.endpoint}?${params}`;

        const abRes = await fetch(`${PROXY}?url=${encodeURIComponent(abUrl)}`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ token: AB_TOKEN }).toString()
        });
        const abData = await abRes.json();

        // Ask Claude to summarize the result
        const summaryPrompt = `The user asked: "${q}"\n\nAgencyBloc returned this data:\n${JSON.stringify(abData, null, 2).substring(0, 3000)}\n\nSummarize this in plain English for a benefits account manager.`;
        const sumRes = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 500,
            messages: [{ role: "user", content: summaryPrompt }]
          })
        });
        const sumData = await sumRes.json();
        const answer = sumData.content?.[0]?.text || JSON.stringify(abData, null, 2);
        addMsg("bot", answer);
        history.push({ role: "assistant", content: answer });

      } catch (e) {
        addMsg("bot error", "Error: " + e.message);
      } finally {
        document.getElementById("sendBtn").disabled = false;
      }
    }

    function addMsg(type, text) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = "msg " + (type === "user" ? "user" : type.includes("error") ? "bot error" : "bot");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
